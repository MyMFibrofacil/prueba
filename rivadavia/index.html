<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#640505",
              "background-light": "#f8f5f5",
              "background-dark": "#221010",
              whatsapp: "#25D366",
            },
            fontFamily: { display: "Inter" },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <script>
    window.APP_CLIENT_KEY = "rivadavia";
    window.APP_ASSET_PREFIX = "../";
  </script>
  <body
    class="bg-background-light font-display text-slate-900 min-h-screen flex flex-col"
  >
    <header class="sticky top-0 z-50 bg-white border-b border-primary/10 shadow-sm relative">
      <img
        id="app-logo"
        src=""
        alt="Logo"
        class="absolute top-2 right-3 w-8 h-8 object-contain opacity-70 pointer-events-none select-none"
        onerror="this.style.display='none'"
      />
      <div
        id="thickness-tabs"
        class="flex overflow-x-auto border-b border-slate-200 px-4 scrollbar-hide"
      ></div>

      <div id="search-wrapper" class="px-4 py-3">
        <label class="flex flex-col min-w-40 h-11 w-full">
          <div
            class="flex w-full flex-1 items-stretch rounded-xl h-full bg-slate-100 border border-slate-200 focus-within:border-primary transition-colors"
          >
            <div class="text-slate-400 flex items-center justify-center pl-4">
              <span class="material-symbols-outlined text-[20px]">search</span>
            </div>
            <input
              id="search-input"
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-3 text-sm font-normal"
              placeholder="Buscar familias o productos..."
            />
          </div>
        </label>
      </div>
    </header>

    <main id="catalog-scroll" class="flex-1 overflow-y-auto pb-52">
      <div id="families-container" class="px-4 py-2 space-y-4"></div>
      <p id="empty-state" class="px-4 text-sm text-slate-500 hidden">
        No encontramos familias o productos con esa búsqueda.
      </p>
    </main>

    <button
      id="scroll-to-bottom"
      type="button"
      aria-label="Ir al final"
      class="fixed right-4 bottom-[calc(12rem+env(safe-area-inset-bottom))] z-[70] size-12 rounded-full bg-primary text-white shadow-lg shadow-primary/25 hover:brightness-110 active:scale-95 transition-all flex items-center justify-center"
    >
      <span class="material-symbols-outlined">keyboard_double_arrow_down</span>
    </button>

    <div
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 space-y-3 z-50 relative"
    >
      <div
        id="summary-details-panel"
        class="absolute left-4 right-4 bottom-[calc(100%+8px)] bg-white border border-slate-200 rounded-xl shadow-xl hidden"
      >
        <div class="px-4 py-3 border-b border-slate-200">
          <p id="summary-title" class="text-sm font-bold">Detalle del pedido</p>
        </div>
        <div id="summary-details-list" class="max-h-72 overflow-y-auto"></div>
      </div>
      <button
        id="summary-toggle"
        class="w-full flex items-center justify-between px-2 py-2 rounded-lg hover:bg-slate-50 transition-colors"
        type="button"
      >
        <div id="summary-totals" class="flex-1 min-w-0 space-y-1"></div>
        <span id="summary-chevron" class="material-symbols-outlined text-slate-500 shrink-0 ml-3">expand_less</span>
      </button>
      <p id="status-message" class="px-2 text-xs text-slate-500 min-h-4"></p>
      <button
        id="send-whatsapp"
        class="w-full bg-whatsapp hover:brightness-110 active:scale-[0.98] transition-all text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-whatsapp/20 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg
          class="size-6 fill-current"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.801 1.026 3.848 1.567 5.925 1.567h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"
          ></path>
        </svg>
        <span id="send-button-label">Copiar Pedido y Abrir WhatsApp</span>
      </button>
    </div>

    <script src="../clients.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
