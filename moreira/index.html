<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#640505",
              "background-light": "#f8f5f5",
              "background-dark": "#221010",
              whatsapp: "#25D366",
              mail: "#2563eb",
            },
            fontFamily: { display: "Inter" },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
    </style>
  </head>
  <script>
    window.APP_CLIENT_KEY = "moreira";
    window.APP_ASSET_PREFIX = "../";
  </script>
  <body
    class="bg-background-light font-display text-slate-900 min-h-screen flex flex-col"
  >
    <iframe
      id="email-send-target"
      name="email-send-target"
      class="hidden"
      tabindex="-1"
      aria-hidden="true"
    ></iframe>
    <form id="email-send-form" method="POST" target="email-send-target" class="hidden">
      <input type="hidden" name="from" value="" />
      <input type="hidden" name="to" value="" />
      <input type="hidden" name="subject" value="" />
      <textarea name="body" class="hidden"></textarea>
      <input type="hidden" name="client_key" value="" />
      <input type="hidden" name="client_name" value="" />
      <input type="hidden" name="created_at" value="" />
    </form>

    <header class="sticky top-0 z-50 bg-white border-b border-primary/10 shadow-sm relative">
      <img
        id="app-logo"
        src=""
        alt="Logo"
        class="absolute top-2 right-3 w-8 h-8 object-contain opacity-70 pointer-events-none select-none"
        onerror="this.style.display='none'"
      />
      <div
        id="thickness-tabs"
        class="flex overflow-x-auto border-b border-slate-200 px-4 scrollbar-hide"
      ></div>

      <div id="search-wrapper" class="px-4 py-3">
        <label class="flex flex-col min-w-40 h-11 w-full">
          <div
            class="flex w-full flex-1 items-stretch rounded-xl h-full bg-slate-100 border border-slate-200 focus-within:border-primary transition-colors"
          >
            <div class="text-slate-400 flex items-center justify-center pl-4">
              <span class="material-symbols-outlined text-[20px]">search</span>
            </div>
            <input
              id="search-input"
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-3 text-sm font-normal"
              placeholder="Buscar familias o productos..."
            />
          </div>
        </label>
      </div>
    </header>

    <main id="catalog-scroll" class="flex-1 overflow-y-auto pb-52">
      <div id="families-container" class="px-4 py-2 space-y-4"></div>
      <p id="empty-state" class="px-4 text-sm text-slate-500 hidden">
        No encontramos familias o productos con esa bÃºsqueda.
      </p>
    </main>

    <button
      id="scroll-to-bottom"
      type="button"
      aria-label="Ir al final"
      class="fixed right-4 bottom-[calc(12rem+env(safe-area-inset-bottom))] z-[70] size-12 rounded-full bg-primary text-white shadow-lg shadow-primary/25 hover:brightness-110 active:scale-95 transition-all flex items-center justify-center"
    >
      <span class="material-symbols-outlined">keyboard_double_arrow_down</span>
    </button>

    <div
      id="status-toast"
      class="pointer-events-none fixed left-1/2 top-5 z-[90] hidden w-[calc(100%-2rem)] max-w-sm -translate-x-1/2 -translate-y-3 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-bold text-emerald-700 shadow-xl shadow-emerald-900/10 opacity-0 transition-all duration-300"
    ></div>

    <div
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 space-y-3 z-50 relative"
    >
      <div
        id="summary-details-panel"
        class="absolute left-4 right-4 bottom-[calc(100%+8px)] bg-white border border-slate-200 rounded-xl shadow-xl hidden"
      >
        <div class="px-4 py-3 border-b border-slate-200">
          <p id="summary-title" class="text-sm font-bold">Detalle del pedido</p>
        </div>
        <div id="summary-details-list" class="max-h-72 overflow-y-auto"></div>
      </div>
      <button
        id="summary-toggle"
        class="w-full flex items-center justify-between px-2 py-2 rounded-lg hover:bg-slate-50 transition-colors"
        type="button"
      >
        <div id="summary-totals" class="flex-1 min-w-0 space-y-1"></div>
        <span id="summary-chevron" class="material-symbols-outlined text-slate-500 shrink-0 ml-3">expand_less</span>
      </button>
      <p id="status-message" class="px-2 text-xs text-slate-500 min-h-4"></p>
      <button
        id="send-whatsapp"
        class="w-full bg-mail hover:brightness-110 active:scale-[0.98] transition-all text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-mail/20 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg
          class="size-6"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M4 6.75h16c.69 0 1.25.56 1.25 1.25v8c0 .69-.56 1.25-1.25 1.25H4c-.69 0-1.25-.56-1.25-1.25V8C2.75 7.31 3.31 6.75 4 6.75Z"
            stroke="currentColor"
            stroke-width="1.5"
          />
          <path
            d="M3.25 8.25 12 13.75l8.75-5.5"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span id="send-button-label">Enviar Pedido por Mail</span>
      </button>
    </div>

    <script src="../clients.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
